<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OpenCV.js Digital Stamping</title>
  <style>
    :root { color-scheme: dark; --panel: rgba(0,0,0,.48); }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#111; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    #camera, #scene { position:fixed; inset:0; width:100%; height:100%; }
    #camera { object-fit:cover; transform:scaleX(-1); background:#111; }
    #scene { pointer-events:none; }
    .shade { position:fixed; inset:0; pointer-events:none; background:radial-gradient(circle at center, transparent 0 38%, rgba(0,0,0,.08) 65%, rgba(0,0,0,.34) 100%); }
    #paperBox { position:fixed; display:none; pointer-events:none; border:3px solid rgba(255,255,255,.96); border-radius:10px; box-shadow:0 0 0 1px rgba(0,0,0,.45),0 0 28px rgba(255,255,255,.55); transition:left .08s linear,top .08s linear,width .08s linear,height .08s linear,box-shadow .2s,border-color .2s; }
    #paperBox::before,#paperBox::after { content:""; position:absolute; width:20px; height:20px; border-color:#fff; }
    #paperBox::before { left:-7px; top:-7px; border-left:4px solid; border-top:4px solid; }
    #paperBox::after { right:-7px; bottom:-7px; border-right:4px solid; border-bottom:4px solid; }
    #paperBox.ready { border-color:#9dffb2; box-shadow:0 0 0 1px rgba(0,0,0,.35),0 0 42px rgba(120,255,160,.9); }
    #progress { position:fixed; left:50%; bottom:96px; width:min(74vw,460px); height:5px; transform:translateX(-50%); overflow:hidden; border-radius:999px; background:rgba(255,255,255,.18); pointer-events:none; }
    #progressBar { width:0; height:100%; border-radius:inherit; background:#fff; transition:width .08s linear; }
    #status { position:fixed; left:50%; bottom:112px; transform:translateX(-50%); width:min(92vw,660px); text-align:center; color:#fff; font-size:14px; line-height:1.55; text-shadow:0 1px 9px rgba(0,0,0,.9); pointer-events:none; }
    #controls { position:fixed; left:50%; bottom:max(18px,env(safe-area-inset-bottom)); transform:translateX(-50%); display:flex; gap:10px; z-index:4; }
    button { appearance:none; border:1px solid rgba(255,255,255,.28); border-radius:999px; padding:11px 16px; color:#fff; background:var(--panel); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); font:inherit; cursor:pointer; white-space:nowrap; }
    button:active { transform:scale(.98); } button:disabled { opacity:.4; cursor:default; }
    #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; }
    #flash.on { animation:flash .32s ease-out; }
    @keyframes flash { 0%{opacity:0} 18%{opacity:.5} 100%{opacity:0} }
    @media(max-width:520px){ button{padding:10px 13px;font-size:13px} #status{font-size:13px;bottom:108px} #progress{bottom:94px} }
  </style>
</head>
<body>
  <video id="camera" autoplay muted playsinline></video>
  <canvas id="scene"></canvas>
  <div class="shade"></div>
  <div id="paperBox" aria-hidden="true"></div>
  <div id="status">OpenCV.js を読み込み中です。しばらくお待ちください…</div>
  <div id="progress"><div id="progressBar"></div></div>
  <div id="controls">
    <button id="startButton" disabled>カメラを開始</button>
    <button id="captureButton" disabled>手動スタンプ</button>
    <button id="clearButton">クリア</button>
  </div>
  <div id="flash"></div>

  <canvas id="analysisCanvas" width="240" height="180" hidden></canvas>
  <canvas id="captureCanvas" hidden></canvas>
  <canvas id="frameCanvas" hidden></canvas>

  <script>
    window.__opencvReady = false;
    window.__opencvLoadError = null;

    window.loadOpenCvWithFallback = async function () {
      const sources = [
        'https://docs.opencv.org/4.x/opencv.js',
        'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js',
        'https://unpkg.com/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js'
      ];

      const waitForRuntime = async () => {
        const started = Date.now();
        while (Date.now() - started < 30000) {
          try {
            if (window.cv && typeof window.cv.then === 'function') {
              window.cv = await window.cv;
            }
            if (window.cv && typeof window.cv.Mat === 'function') return true;
          } catch (_) {}
          await new Promise(resolve => setTimeout(resolve, 120));
        }
        return false;
      };

      for (const src of sources) {
        try {
          const script = document.createElement('script');
          script.async = true;
          script.src = src;
          script.crossOrigin = 'anonymous';
          const loaded = new Promise((resolve, reject) => {
            script.onload = resolve;
            script.onerror = () => reject(new Error('script load failed'));
          });
          document.head.appendChild(script);
          await loaded;
          if (await waitForRuntime()) {
            window.__opencvReady = true;
            window.dispatchEvent(new Event('opencv-ready'));
            return;
          }
          script.remove();
          try { delete window.cv; } catch (_) { window.cv = undefined; }
        } catch (error) {
          window.__opencvLoadError = error;
        }
      }

      window.dispatchEvent(new Event('opencv-error'));
    };

    window.loadOpenCvWithFallback();
  </script>

  <script>
  (() => {
    'use strict';

    const video = document.getElementById('camera');
    const scene = document.getElementById('scene');
    const ctx = scene.getContext('2d');
    const analysisCanvas = document.getElementById('analysisCanvas');
    const actx = analysisCanvas.getContext('2d', { willReadFrequently: true });
    const captureCanvas = document.getElementById('captureCanvas');
    const frameCanvas = document.getElementById('frameCanvas');
    const fctx = frameCanvas.getContext('2d');
    const paperBox = document.getElementById('paperBox');
    const progressBar = document.getElementById('progressBar');
    const status = document.getElementById('status');
    const startButton = document.getElementById('startButton');
    const captureButton = document.getElementById('captureButton');
    const clearButton = document.getElementById('clearButton');
    const flash = document.getElementById('flash');

    const CONFIG = {
      stableSeconds: 1.5,
      cooldownMs: 1800,
      analysisIntervalMs: 110,
      minAreaRatio: 0.05,
      maxAreaRatio: 0.86,
      minAspect: 0.45,
      maxAspect: 2.25,
      canny1: 60,
      canny2: 160,
      maxMeanBorder: 125,
      minMeanInner: 135,
      maxInnerStd: 95,
      borderInsetScale: 0.16,
      captureInsetScale: 0.075,
      bboxStability: 0.07,
      maxCaptureSide: 820,
      maxStamps: 30
    };

    let stream = null;
    let timer = null;
    let stamps = [];
    let detectedQuad = null;
    let smoothedQuad = null;
    let previousStableQuad = null;
    let stableTime = 0;
    let lastTick = performance.now();
    let lastCapture = 0;
    let cvReady = false;

    function setStatus(text) { status.textContent = text; }

    function resizeScene() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      scene.width = Math.round(innerWidth * dpr);
      scene.height = Math.round(innerHeight * dpr);
      scene.style.width = innerWidth + 'px';
      scene.style.height = innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function stopCamera() {
      if (timer) { clearInterval(timer); timer = null; }
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    async function startCamera() {
      if (!cvReady || typeof cv === 'undefined') {
        setStatus('OpenCV.js の読み込み完了を待っています…');
        return;
      }
      try {
        stopCamera();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        startButton.textContent = 'カメラ再起動';
        captureButton.disabled = false;
        setStatus('黒い縁付きの白い紙を画面内にかざしてください。四角形を認識すると自動スタンプします。');
        stableTime = 0;
        detectedQuad = smoothedQuad = previousStableQuad = null;
        lastTick = performance.now();
        timer = setInterval(analyse, CONFIG.analysisIntervalMs);
      } catch (err) {
        console.error(err);
        setStatus('カメラを開始できません。HTTPS環境とカメラ許可を確認してください。');
      }
    }

    function getVideoCrop() {
      const vw = video.videoWidth, vh = video.videoHeight;
      const sw = innerWidth, sh = innerHeight;
      const vr = vw / vh, sr = sw / sh;
      if (vr > sr) {
        const visibleW = vh * sr;
        return { vw, vh, visibleW, visibleH: vh, cropX: (vw - visibleW) / 2, cropY: 0 };
      }
      const visibleH = vw / sr;
      return { vw, vh, visibleW: vw, visibleH, cropX: 0, cropY: (vh - visibleH) / 2 };
    }

    function screenPointFromAnalysis(p) {
      return {
        x: p.x / analysisCanvas.width * innerWidth,
        y: p.y / analysisCanvas.height * innerHeight
      };
    }

    function screenBoxFromQuad(quad) {
      const xs = quad.map(p => p.x);
      const ys = quad.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      return screenPointRect(minX, minY, maxX - minX, maxY - minY);
    }

    function screenPointRect(x, y, w, h) {
      return {
        x: x / analysisCanvas.width * innerWidth,
        y: y / analysisCanvas.height * innerHeight,
        w: w / analysisCanvas.width * innerWidth,
        h: h / analysisCanvas.height * innerHeight
      };
    }

    function analysisToFramePoint(p, frameW, frameH) {
      return {
        x: p.x / analysisCanvas.width * frameW,
        y: p.y / analysisCanvas.height * frameH
      };
    }

    function orderQuad(points) {
      const pts = points.map(p => ({ x: p.x, y: p.y }));
      const sums = pts.map(p => p.x + p.y);
      const diffs = pts.map(p => p.x - p.y);
      const topLeft = pts[sums.indexOf(Math.min(...sums))];
      const bottomRight = pts[sums.indexOf(Math.max(...sums))];
      const topRight = pts[diffs.indexOf(Math.max(...diffs))];
      const bottomLeft = pts[diffs.indexOf(Math.min(...diffs))];
      return [topLeft, topRight, bottomRight, bottomLeft];
    }

    function quadCenter(quad) {
      return quad.reduce((acc, p) => ({ x: acc.x + p.x / 4, y: acc.y + p.y / 4 }), { x: 0, y: 0 });
    }

    function scaleQuad(quad, scale) {
      const c = quadCenter(quad);
      return quad.map(p => ({ x: c.x + (p.x - c.x) * scale, y: c.y + (p.y - c.y) * scale }));
    }

    function smoothQuad(prev, next) {
      if (!prev) return next.map(p => ({ x: p.x, y: p.y }));
      const a = 0.35;
      return prev.map((p, i) => ({ x: p.x * (1 - a) + next[i].x * a, y: p.y * (1 - a) + next[i].y * a }));
    }

    function quadDistance(a, b) {
      if (!a || !b) return Infinity;
      let total = 0;
      for (let i = 0; i < 4; i++) total += Math.hypot(a[i].x - b[i].x, a[i].y - b[i].y);
      return (total / 4) / Math.hypot(analysisCanvas.width, analysisCanvas.height);
    }

    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

    function angleScore(quad) {
      let score = 0;
      for (let i = 0; i < 4; i++) {
        const p0 = quad[(i + 3) % 4], p1 = quad[i], p2 = quad[(i + 1) % 4];
        const v1x = p0.x - p1.x, v1y = p0.y - p1.y;
        const v2x = p2.x - p1.x, v2y = p2.y - p1.y;
        const dot = v1x * v2x + v1y * v2y;
        const mag = Math.hypot(v1x, v1y) * Math.hypot(v2x, v2y) || 1;
        const cos = Math.abs(dot / mag);
        score += 1 - cos;
      }
      return score / 4;
    }

    function matFromPoints(points, type = cv.CV_32SC2) {
      return cv.matFromArray(4, 1, type, points.flatMap(p => [p.x, p.y]));
    }

    function meanStdFromMask(gray, mask) {
      const mean = new cv.Mat();
      const stddev = new cv.Mat();
      cv.meanStdDev(gray, mean, stddev, mask);
      const out = { mean: mean.data64F[0], std: stddev.data64F[0] };
      mean.delete();
      stddev.delete();
      return out;
    }

    function detectQuadWithOpenCV() {
      const src = cv.imread(analysisCanvas);
      const gray = new cv.Mat();
      const blur = new cv.Mat();
      const edges = new cv.Mat();
      const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();

      try {
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
        cv.Canny(blur, edges, CONFIG.canny1, CONFIG.canny2);
        cv.dilate(edges, edges, kernel);
        cv.morphologyEx(edges, edges, cv.MORPH_CLOSE, kernel);
        cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

        let best = null;
        const W = analysisCanvas.width;
        const H = analysisCanvas.height;

        for (let i = 0; i < contours.size(); i++) {
          const cnt = contours.get(i);
          const approx = new cv.Mat();
          try {
            const peri = cv.arcLength(cnt, true);
            cv.approxPolyDP(cnt, approx, 0.03 * peri, true);
            if (approx.rows !== 4 || !cv.isContourConvex(approx)) continue;

            const area = Math.abs(cv.contourArea(approx));
            const areaRatio = area / (W * H);
            if (areaRatio < CONFIG.minAreaRatio || areaRatio > CONFIG.maxAreaRatio) continue;

            const points = [];
            for (let r = 0; r < 4; r++) points.push({ x: approx.intPtr(r, 0)[0], y: approx.intPtr(r, 0)[1] });
            const quad = orderQuad(points);
            const widthTop = dist(quad[0], quad[1]), widthBottom = dist(quad[3], quad[2]);
            const heightLeft = dist(quad[0], quad[3]), heightRight = dist(quad[1], quad[2]);
            const avgW = (widthTop + widthBottom) / 2;
            const avgH = (heightLeft + heightRight) / 2;
            if (avgW < 20 || avgH < 20) continue;
            const aspect = avgW / avgH;
            if (aspect < CONFIG.minAspect || aspect > CONFIG.maxAspect) continue;

            const outerMask = cv.Mat.zeros(H, W, cv.CV_8UC1);
            const innerMask = cv.Mat.zeros(H, W, cv.CV_8UC1);
            const borderMask = new cv.Mat();
            const quadOuter = matFromPoints(quad, cv.CV_32SC2);
            const quadInner = matFromPoints(scaleQuad(quad, 1 - CONFIG.borderInsetScale), cv.CV_32SC2);
            cv.fillConvexPoly(outerMask, quadOuter, new cv.Scalar(255));
            cv.fillConvexPoly(innerMask, quadInner, new cv.Scalar(255));
            cv.subtract(outerMask, innerMask, borderMask);

            const innerStats = meanStdFromMask(gray, innerMask);
            const borderStats = meanStdFromMask(gray, borderMask);

            quadOuter.delete();
            quadInner.delete();
            outerMask.delete();
            innerMask.delete();
            borderMask.delete();

            if (innerStats.mean < CONFIG.minMeanInner) continue;
            if (borderStats.mean > CONFIG.maxMeanBorder) continue;
            if (innerStats.std > CONFIG.maxInnerStd) continue;

            const score = area * angleScore(quad) * (innerStats.mean / 255) * (1.3 - borderStats.mean / 255);
            if (!best || score > best.score) best = { quad, score };
          } finally {
            approx.delete();
            cnt.delete();
          }
        }

        return best ? best.quad : null;
      } finally {
        src.delete(); gray.delete(); blur.delete(); edges.delete(); kernel.delete(); contours.delete(); hierarchy.delete();
      }
    }

    function updateGuide(quad, readyRatio) {
      if (!quad) {
        paperBox.style.display = 'none';
        paperBox.classList.remove('ready');
        return;
      }
      const sb = screenBoxFromQuad(quad);
      paperBox.style.display = 'block';
      paperBox.style.left = sb.x + 'px';
      paperBox.style.top = sb.y + 'px';
      paperBox.style.width = sb.w + 'px';
      paperBox.style.height = sb.h + 'px';
      paperBox.classList.toggle('ready', readyRatio > 0.72);
    }

    function analyse() {
      if (!stream || video.readyState < 2 || !video.videoWidth || !cvReady || typeof cv === 'undefined') return;
      const now = performance.now();
      const dt = Math.min((now - lastTick) / 1000, 0.25);
      lastTick = now;

      const crop = getVideoCrop();
      actx.save();
      actx.setTransform(-1, 0, 0, 1, analysisCanvas.width, 0);
      actx.drawImage(video, crop.cropX, crop.cropY, crop.visibleW, crop.visibleH, 0, 0, analysisCanvas.width, analysisCanvas.height);
      actx.restore();

      detectedQuad = detectQuadWithOpenCV();
      const cooled = now - lastCapture > CONFIG.cooldownMs;

      if (detectedQuad) {
        smoothedQuad = smoothQuad(smoothedQuad, detectedQuad);
        const stable = quadDistance(detectedQuad, previousStableQuad) < CONFIG.bboxStability && cooled;
        if (stable) {
          stableTime += dt;
          setStatus('黒い縁の四角形を認識しています。そのまま 1.5 秒静止してください…');
        } else {
          stableTime = Math.max(0, stableTime - dt * 1.2);
          setStatus(cooled ? '黒い縁の紙を認識しました。少し静止してください。' : 'スタンプしました。次の紙を準備してください。');
        }
        previousStableQuad = detectedQuad.map(p => ({ x: p.x, y: p.y }));
      } else {
        detectedQuad = smoothedQuad = previousStableQuad = null;
        stableTime = Math.max(0, stableTime - dt * 2);
        setStatus(cooled ? '黒い縁付きの白い紙をかざしてください。紙全体が映ると認識しやすくなります。' : 'スタンプしました。次の紙を準備してください。');
      }

      const ratio = Math.min(stableTime / CONFIG.stableSeconds, 1);
      progressBar.style.width = (ratio * 100) + '%';
      updateGuide(smoothedQuad, ratio);
      if (stableTime >= CONFIG.stableSeconds) {
        stableTime = 0;
        progressBar.style.width = '0%';
        captureStamp();
      }
    }

    function captureStamp() {
      if (!stream || video.readyState < 2 || !smoothedQuad || !cvReady || typeof cv === 'undefined') {
        setStatus('黒い縁付きの紙が認識されていません。');
        return;
      }

      const crop = getVideoCrop();
      const frameW = Math.round(crop.visibleW);
      const frameH = Math.round(crop.visibleH);
      frameCanvas.width = frameW;
      frameCanvas.height = frameH;

      fctx.save();
      fctx.setTransform(-1, 0, 0, 1, frameW, 0);
      fctx.clearRect(0, 0, frameW, frameH);
      fctx.drawImage(video, crop.cropX, crop.cropY, crop.visibleW, crop.visibleH, 0, 0, frameW, frameH);
      fctx.restore();

      const quad = orderQuad(smoothedQuad.map(p => analysisToFramePoint(p, frameW, frameH)));
      const insetQuad = scaleQuad(quad, 1 - CONFIG.captureInsetScale);
      const widthTop = dist(insetQuad[0], insetQuad[1]);
      const widthBottom = dist(insetQuad[3], insetQuad[2]);
      const heightLeft = dist(insetQuad[0], insetQuad[3]);
      const heightRight = dist(insetQuad[1], insetQuad[2]);
      let outW = Math.round(Math.max(widthTop, widthBottom));
      let outH = Math.round(Math.max(heightLeft, heightRight));
      const capScale = Math.min(1, CONFIG.maxCaptureSide / Math.max(outW, outH, 1));
      outW = Math.max(80, Math.round(outW * capScale));
      outH = Math.max(80, Math.round(outH * capScale));

      const src = cv.imread(frameCanvas);
      const dst = new cv.Mat();
      const srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, insetQuad.flatMap(p => [p.x, p.y]));
      const dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, outW-1,0, outW-1,outH-1, 0,outH-1]);
      const M = cv.getPerspectiveTransform(srcTri, dstTri);
      cv.warpPerspective(src, dst, M, new cv.Size(outW, outH), cv.INTER_LINEAR, cv.BORDER_REPLICATE, new cv.Scalar());
      captureCanvas.width = outW;
      captureCanvas.height = outH;
      cv.imshow(captureCanvas, dst);
      src.delete(); dst.delete(); srcTri.delete(); dstTri.delete(); M.delete();

      const img = new Image();
      img.onload = () => {
        const sb = screenBoxFromQuad(smoothedQuad);
        const maxDisplay = Math.min(innerWidth * 0.58, 360);
        const ratio = outW / outH;
        let w = Math.min(sb.w, maxDisplay);
        let h = w / ratio;
        if (h > innerHeight * 0.5) {
          h = innerHeight * 0.5;
          w = h * ratio;
        }
        stamps.push({
          image: img,
          x: sb.x + sb.w / 2,
          y: sb.y + sb.h / 2,
          width: w,
          height: h,
          vx: (Math.random() - 0.5) * 20,
          vy: 18 + Math.random() * 12,
          gravity: 13 + Math.random() * 8,
          angle: (Math.random() - 0.5) * 0.18,
          angularVelocity: (Math.random() - 0.5) * 0.26,
          phase: Math.random() * Math.PI * 2,
          flutter: 16 + Math.random() * 20,
          flutterSpeed: 1.1 + Math.random() * 1.5,
          age: 0
        });
        if (stamps.length > CONFIG.maxStamps) stamps.shift();
      };
      img.src = captureCanvas.toDataURL('image/jpeg', 0.92);

      lastCapture = performance.now();
      flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
      paperBox.classList.remove('ready');
      setStatus('スタンプしました。次の紙を準備してください。');
    }

    function drawStamp(s, time, dt) {
      s.age += dt;
      s.vy += s.gravity * dt;
      s.y += s.vy * dt;
      s.x += s.vx * dt + Math.sin(time * s.flutterSpeed + s.phase) * s.flutter * dt;
      s.angle += s.angularVelocity * dt + Math.sin(time * 1.7 + s.phase) * 0.012;
      const squash = 0.8 + Math.abs(Math.cos(time * s.flutterSpeed + s.phase)) * 0.2;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.angle);
      ctx.scale(squash, 1);
      ctx.shadowColor = 'rgba(0,0,0,.3)';
      ctx.shadowBlur = Math.max(6, 18 * squash);
      ctx.shadowOffsetY = 8;
      ctx.drawImage(s.image, -s.width / 2, -s.height / 2, s.width, s.height);
      ctx.restore();
    }

    let prevAnim = performance.now();
    function animate(now) {
      const dt = Math.min((now - prevAnim) / 1000, 0.04);
      prevAnim = now;
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      const t = now / 1000;
      for (const s of stamps) drawStamp(s, t, dt);
      stamps = stamps.filter(s => s.y - s.height / 2 < innerHeight + 100 && s.age < 30);
      requestAnimationFrame(animate);
    }

    function handleOpenCvReady() {
      cvReady = true;
      startButton.disabled = false;
      setStatus('OpenCV.js の準備ができました。「カメラを開始」を押してください。');
    }

    function handleOpenCvError() {
      cvReady = false;
      startButton.disabled = true;
      setStatus('OpenCV.jsを読み込めませんでした。インターネット接続、広告・追跡防止機能、CDNのブロックを確認してください。');
    }

    if (window.__opencvReady && window.cv && typeof window.cv.Mat === 'function') {
      handleOpenCvReady();
    } else {
      window.addEventListener('opencv-ready', handleOpenCvReady, { once: true });
      window.addEventListener('opencv-error', handleOpenCvError, { once: true });
    }

    startButton.addEventListener('click', startCamera);
    captureButton.addEventListener('click', captureStamp);
    clearButton.addEventListener('click', () => { stamps = []; });
    window.addEventListener('resize', resizeScene);
    window.addEventListener('beforeunload', stopCamera);

    resizeScene();
    requestAnimationFrame(animate);
  })();
  </script>
</body>
</html>
