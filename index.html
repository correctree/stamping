<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bordered Paper Auto Stamping</title>
  <style>
    :root { color-scheme: dark; --panel: rgba(0,0,0,.48); }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#111; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    #camera, #scene { position:fixed; inset:0; width:100%; height:100%; }
    #camera { object-fit:cover; transform:scaleX(-1); background:#111; }
    #scene { pointer-events:none; }
    .shade { position:fixed; inset:0; pointer-events:none; background:radial-gradient(circle at center, transparent 0 38%, rgba(0,0,0,.08) 65%, rgba(0,0,0,.34) 100%); }
    #paperBox { position:fixed; display:none; pointer-events:none; border:3px solid rgba(255,255,255,.95); border-radius:10px; box-shadow:0 0 0 1px rgba(0,0,0,.45),0 0 28px rgba(255,255,255,.55); transition:left .08s linear,top .08s linear,width .08s linear,height .08s linear,box-shadow .2s,border-color .2s; }
    #paperBox::before,#paperBox::after { content:""; position:absolute; width:20px; height:20px; border-color:#fff; }
    #paperBox::before { left:-7px; top:-7px; border-left:4px solid; border-top:4px solid; }
    #paperBox::after { right:-7px; bottom:-7px; border-right:4px solid; border-bottom:4px solid; }
    #paperBox.ready { border-color:#9dffb2; box-shadow:0 0 0 1px rgba(0,0,0,.35),0 0 42px rgba(120,255,160,.9); }
    #progress { position:fixed; left:50%; bottom:96px; width:min(74vw,460px); height:5px; transform:translateX(-50%); overflow:hidden; border-radius:999px; background:rgba(255,255,255,.18); pointer-events:none; }
    #progressBar { width:0; height:100%; border-radius:inherit; background:#fff; transition:width .08s linear; }
    #status { position:fixed; left:50%; bottom:112px; transform:translateX(-50%); width:min(90vw,620px); text-align:center; color:#fff; font-size:14px; line-height:1.55; text-shadow:0 1px 9px rgba(0,0,0,.9); pointer-events:none; }
    #controls { position:fixed; left:50%; bottom:max(18px,env(safe-area-inset-bottom)); transform:translateX(-50%); display:flex; gap:10px; z-index:4; }
    button { appearance:none; border:1px solid rgba(255,255,255,.28); border-radius:999px; padding:11px 16px; color:#fff; background:var(--panel); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); font:inherit; cursor:pointer; white-space:nowrap; }
    button:active { transform:scale(.98); } button:disabled { opacity:.4; cursor:default; }
    #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; }
    #flash.on { animation:flash .32s ease-out; }
    @keyframes flash { 0%{opacity:0} 18%{opacity:.5} 100%{opacity:0} }
    @media(max-width:520px){ button{padding:10px 13px;font-size:13px} #status{font-size:13px;bottom:108px} #progress{bottom:94px} }
  </style>
</head>
<body>
  <video id="camera" autoplay muted playsinline></video>
  <canvas id="scene"></canvas>
  <div class="shade"></div>
  <div id="paperBox" aria-hidden="true"></div>
  <div id="status">「カメラを開始」を押し、黒い縁付きの白い紙を画面内にかざしてください。</div>
  <div id="progress"><div id="progressBar"></div></div>
  <div id="controls">
    <button id="startButton">カメラを開始</button>
    <button id="captureButton" disabled>手動スタンプ</button>
    <button id="clearButton">クリア</button>
  </div>
  <div id="flash"></div>
  <canvas id="analysisCanvas" width="160" height="120" hidden></canvas>
  <canvas id="captureCanvas" hidden></canvas>


<script>
(() => {
  'use strict';
  const video = document.getElementById('camera');
  const scene = document.getElementById('scene');
  const ctx = scene.getContext('2d');
  const analysisCanvas = document.getElementById('analysisCanvas');
  const actx = analysisCanvas.getContext('2d', { willReadFrequently:true });
  const captureCanvas = document.getElementById('captureCanvas');
  const cctx = captureCanvas.getContext('2d');
  const paperBox = document.getElementById('paperBox');
  const progressBar = document.getElementById('progressBar');
  const status = document.getElementById('status');
  const startButton = document.getElementById('startButton');
  const captureButton = document.getElementById('captureButton');
  const clearButton = document.getElementById('clearButton');
  const flash = document.getElementById('flash');

  const CONFIG = {
    stableSeconds: 1.6,
    cooldownMs: 1800,
    analysisIntervalMs: 100,
    minAreaRatio: 0.04,
    maxAreaRatio: 0.84,
    minAspect: 0.45,
    maxAspect: 2.2,
    darkBrightness: 78,
    darkChromaMax: 80,
    innerWhiteBrightness: 150,
    maxInnerDarkRatio: 0.12,
    minBorderDarkRatio: 0.24,
    maxComponentFill: 0.42,
    minComponentFill: 0.02,
    bboxStability: 0.08,
    captureMaxSide: 620,
    maxStamps: 30,
    defaultInsetRatio: 0.08
  };

  let stream = null, timer = null, stamps = [];
  let detected = null, smoothed = null, previousStableBox = null;
  let stableTime = 0, lastTick = performance.now(), lastCapture = 0;

  function resizeScene(){
    const dpr = Math.min(devicePixelRatio || 1, 2);
    scene.width = Math.round(innerWidth*dpr); scene.height = Math.round(innerHeight*dpr);
    scene.style.width = innerWidth+'px'; scene.style.height = innerHeight+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function getVideoCrop(){
    const vw=video.videoWidth, vh=video.videoHeight, sw=innerWidth, sh=innerHeight;
    const vr=vw/vh, sr=sw/sh;
    if(vr>sr){ const visibleW=vh*sr; return {vw,vh,visibleW,visibleH:vh,cropX:(vw-visibleW)/2,cropY:0}; }
    const visibleH=vw/sr; return {vw,vh,visibleW:vw,visibleH,cropX:0,cropY:(vh-visibleH)/2};
  }

  function screenBoxFromAnalysis(b){
    return { x:b.x/analysisCanvas.width*innerWidth, y:b.y/analysisCanvas.height*innerHeight,
      w:b.w/analysisCanvas.width*innerWidth, h:b.h/analysisCanvas.height*innerHeight };
  }

  function sourceRectFromAnalysis(b){
    const crop=getVideoCrop();
    const mx=b.x/analysisCanvas.width*crop.visibleW;
    const my=b.y/analysisCanvas.height*crop.visibleH;
    const mw=b.w/analysisCanvas.width*crop.visibleW;
    const mh=b.h/analysisCanvas.height*crop.visibleH;
    return { sx:crop.cropX+(crop.visibleW-mx-mw), sy:crop.cropY+my, sw:mw, sh:mh };
  }

  async function startCamera(){
    try{
      stopCamera();
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});
      video.srcObject=stream; await video.play();
      startButton.textContent='カメラ再起動'; captureButton.disabled=false;
      status.textContent='黒い縁付きの白い紙を画面内にかざしてください。縁が認識されると輪郭が表示されます。';
      stableTime=0; detected=smoothed=previousStableBox=null; lastTick=performance.now();
      timer=setInterval(analyse,CONFIG.analysisIntervalMs);
    }catch(e){ console.error(e); status.textContent='カメラを開始できません。HTTPS環境とカメラ許可を確認してください。'; }
  }

  function stopCamera(){
    if(timer){clearInterval(timer);timer=null;}
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  }

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function isDarkPixel(d, i){
    const r=d[i], g=d[i+1], b=d[i+2];
    const max=Math.max(r,g,b), min=Math.min(r,g,b), lum=.299*r+.587*g+.114*b;
    return lum <= CONFIG.darkBrightness && (max-min) <= CONFIG.darkChromaMax;
  }

  function findBorderedPaper(image){
    const W=analysisCanvas.width, H=analysisCanvas.height, d=image.data;
    const mask=new Uint8Array(W*H);
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const idx=(y*W+x)*4;
        if(isDarkPixel(d, idx)) mask[y*W+x]=1;
      }
    }

    const seen=new Uint8Array(W*H), qx=new Int16Array(W*H), qy=new Int16Array(W*H);
    let best=null;

    for(let y=1;y<H-1;y++){
      for(let x=1;x<W-1;x++){
        const start=y*W+x;
        if(!mask[start] || seen[start]) continue;

        let head=0, tail=0;
        qx[tail]=x; qy[tail++]=y; seen[start]=1;
        let count=0, minX=x, maxX=x, minY=y, maxY=y;

        while(head<tail){
          const cx=qx[head], cy=qy[head++];
          count++;
          if(cx<minX) minX=cx; if(cx>maxX) maxX=cx; if(cy<minY) minY=cy; if(cy>maxY) maxY=cy;
          const neighbors=[[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]];
          for(const [nx,ny] of neighbors){
            if(nx<1||nx>=W-1||ny<1||ny>=H-1) continue;
            const ni=ny*W+nx;
            if(mask[ni] && !seen[ni]){ seen[ni]=1; qx[tail]=nx; qy[tail++]=ny; }
          }
        }

        const w=maxX-minX+1, h=maxY-minY+1;
        const bboxArea=w*h, areaRatio=bboxArea/(W*H), aspect=w/h, componentFill=count/bboxArea;
        if(areaRatio<CONFIG.minAreaRatio || areaRatio>CONFIG.maxAreaRatio) continue;
        if(aspect<CONFIG.minAspect || aspect>CONFIG.maxAspect) continue;
        if(componentFill<CONFIG.minComponentFill || componentFill>CONFIG.maxComponentFill) continue;

        const borderT = Math.max(2, Math.round(Math.min(w,h)*0.1));
        const innerX=minX+borderT, innerY=minY+borderT, innerW=w-borderT*2, innerH=h-borderT*2;
        if(innerW<10 || innerH<10) continue;

        let borderDark=0, borderTotal=0, innerDark=0, innerTotal=0, innerLumSum=0;
        for(let yy=minY; yy<=maxY; yy++){
          for(let xx=minX; xx<=maxX; xx++){
            const inInner = xx>=innerX && xx<innerX+innerW && yy>=innerY && yy<innerY+innerH;
            const idx=(yy*W+xx)*4;
            const dark = isDarkPixel(d, idx);
            if(inInner){
              innerTotal++;
              if(dark) innerDark++;
              innerLumSum += .299*d[idx]+.587*d[idx+1]+.114*d[idx+2];
            }else{
              borderTotal++;
              if(dark) borderDark++;
            }
          }
        }
        if(borderTotal===0 || innerTotal===0) continue;
        const borderDarkRatio=borderDark/borderTotal;
        const innerDarkRatio=innerDark/innerTotal;
        const innerLumAvg=innerLumSum/innerTotal;
        if(borderDarkRatio < CONFIG.minBorderDarkRatio) continue;
        if(innerDarkRatio > CONFIG.maxInnerDarkRatio) continue;
        if(innerLumAvg < CONFIG.innerWhiteBrightness) continue;

        const touchesEdge = minX<2 || minY<2 || maxX>W-3 || maxY>H-3;
        const edgePenalty = touchesEdge ? 0.68 : 1;
        const rectangularity = 1 - Math.abs((componentFill*2.6) - 0.42);
        const score = bboxArea * borderDarkRatio * (innerLumAvg/255) * (1-innerDarkRatio) * Math.max(0.25, rectangularity) * edgePenalty;

        const candidate = {
          x:minX, y:minY, w, h, score,
          borderThickness:borderT,
          innerLumAvg,
          borderDarkRatio,
          innerDarkRatio
        };
        if(!best || candidate.score > best.score) best = candidate;
      }
    }
    return best;
  }

  function boxDistance(a,b){
    if(!a||!b)return Infinity;
    const acx=a.x+a.w/2,acy=a.y+a.h/2,bcx=b.x+b.w/2,bcy=b.y+b.h/2;
    const pos=Math.hypot(acx-bcx,acy-bcy)/Math.hypot(analysisCanvas.width,analysisCanvas.height);
    const size=(Math.abs(a.w-b.w)+Math.abs(a.h-b.h))/(analysisCanvas.width+analysisCanvas.height);
    return pos+size;
  }

  function smoothBox(prev,next){
    if(!prev) return {...next};
    const a=.35;
    return {
      x:prev.x*(1-a)+next.x*a,
      y:prev.y*(1-a)+next.y*a,
      w:prev.w*(1-a)+next.w*a,
      h:prev.h*(1-a)+next.h*a,
      borderThickness:prev.borderThickness*(1-a)+next.borderThickness*a
    };
  }

  function analyse(){
    if(!stream||video.readyState<2||!video.videoWidth)return;
    const now=performance.now(), dt=Math.min((now-lastTick)/1000,.25); lastTick=now;
    const crop=getVideoCrop();
    actx.save();
    actx.setTransform(-1,0,0,1,analysisCanvas.width,0);
    actx.drawImage(video,crop.cropX,crop.cropY,crop.visibleW,crop.visibleH,0,0,analysisCanvas.width,analysisCanvas.height);
    actx.restore();

    const image=actx.getImageData(0,0,analysisCanvas.width,analysisCanvas.height);
    detected=findBorderedPaper(image);
    const cooled=now-lastCapture>CONFIG.cooldownMs;

    if(detected){
      smoothed=smoothBox(smoothed, detected);
      const sb=screenBoxFromAnalysis(smoothed);
      paperBox.style.display='block';
      paperBox.style.left=sb.x+'px';
      paperBox.style.top=sb.y+'px';
      paperBox.style.width=sb.w+'px';
      paperBox.style.height=sb.h+'px';
      const stable=boxDistance(detected,previousStableBox)<CONFIG.bboxStability && cooled;
      if(stable){
        stableTime += dt;
        status.textContent='黒い縁の紙を認識しています。そのまま静止してください…';
      }else{
        stableTime = Math.max(0, stableTime-dt*1.4);
        status.textContent = cooled ? '黒い縁の紙を認識しました。少し静止してください。' : 'スタンプしました。次の紙を準備してください。';
      }
      previousStableBox={...detected};
    }else{
      detected=smoothed=previousStableBox=null;
      stableTime=Math.max(0, stableTime-dt*2);
      paperBox.style.display='none';
      status.textContent = cooled ? '黒い縁付きの白い紙をかざしてください。背景より暗い縁が見えると認識しやすくなります。' : 'スタンプしました。次の紙を準備してください。';
    }

    const ratio=Math.min(stableTime/CONFIG.stableSeconds,1);
    progressBar.style.width=(ratio*100)+'%';
    paperBox.classList.toggle('ready', ratio > .72);
    if(stableTime>=CONFIG.stableSeconds){
      stableTime=0;
      progressBar.style.width='0%';
      captureStamp();
    }
  }

  function captureStamp(){
    if(!stream||video.readyState<2||!smoothed){ status.textContent='黒い縁付きの紙が認識されていません。'; return; }

    const inset = Math.max(Math.round(smoothed.borderThickness || Math.min(smoothed.w, smoothed.h)*CONFIG.defaultInsetRatio), Math.round(Math.min(smoothed.w, smoothed.h)*0.045));
    const b={
      x: clamp(smoothed.x+inset, 0, analysisCanvas.width-8),
      y: clamp(smoothed.y+inset, 0, analysisCanvas.height-8),
      w: clamp(smoothed.w-inset*2, 8, analysisCanvas.width),
      h: clamp(smoothed.h-inset*2, 8, analysisCanvas.height)
    };

    const r=sourceRectFromAnalysis(b);
    const scale=Math.min(1, CONFIG.captureMaxSide/Math.max(r.sw,r.sh));
    const outW=Math.max(80, Math.round(r.sw*scale)), outH=Math.max(80, Math.round(r.sh*scale));
    captureCanvas.width=outW; captureCanvas.height=outH;
    cctx.clearRect(0,0,outW,outH);
    cctx.save();
    cctx.setTransform(-1,0,0,1,outW,0);
    cctx.drawImage(video,r.sx,r.sy,r.sw,r.sh,0,0,outW,outH);
    cctx.restore();

    const image = new Image();
    image.onload = () => {
      const sb=screenBoxFromAnalysis(b), maxDisplay=Math.min(innerWidth*.58, 360), ratio=outW/outH;
      let w=Math.min(sb.w, maxDisplay), h=w/ratio;
      if(h>innerHeight*.5){ h=innerHeight*.5; w=h*ratio; }
      stamps.push({
        image,
        x:sb.x+sb.w/2,
        y:sb.y+sb.h/2,
        width:w,
        height:h,
        vx:(Math.random()-.5)*20,
        vy:18+Math.random()*12,
        gravity:13+Math.random()*8,
        angle:(Math.random()-.5)*.18,
        angularVelocity:(Math.random()-.5)*.26,
        phase:Math.random()*Math.PI*2,
        flutter:16+Math.random()*20,
        flutterSpeed:1.1+Math.random()*1.5,
        age:0,
        opacity:1
      });
      if(stamps.length>CONFIG.maxStamps) stamps.shift();
    };
    image.src=captureCanvas.toDataURL('image/jpeg', .92);

    lastCapture=performance.now();
    flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
    paperBox.classList.remove('ready');
    status.textContent='スタンプしました。次の紙を準備してください。';
  }

  function drawStamp(s,time,dt){
    s.age+=dt;
    s.vy+=s.gravity*dt;
    s.y+=s.vy*dt;
    s.x+=s.vx*dt + Math.sin(time*s.flutterSpeed+s.phase)*s.flutter*dt;
    s.angle+=s.angularVelocity*dt + Math.sin(time*1.7+s.phase)*.012;
    const squash=.8+Math.abs(Math.cos(time*s.flutterSpeed+s.phase))*.2;
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.angle);
    ctx.scale(squash,1);
    ctx.shadowColor='rgba(0,0,0,.3)';
    ctx.shadowBlur=Math.max(6,18*squash);
    ctx.shadowOffsetY=8;
    ctx.drawImage(s.image,-s.width/2,-s.height/2,s.width,s.height);
    ctx.restore();
  }

  let prevAnim=performance.now();
  function animate(now){
    const dt=Math.min((now-prevAnim)/1000,.04); prevAnim=now;
    ctx.clearRect(0,0,innerWidth,innerHeight);
    const t=now/1000;
    for(const s of stamps) drawStamp(s,t,dt);
    stamps=stamps.filter(s=>s.y-s.height/2<innerHeight+100 && s.age<30);
    requestAnimationFrame(animate);
  }

  startButton.addEventListener('click',startCamera);
  captureButton.addEventListener('click',captureStamp);
  clearButton.addEventListener('click',()=>stamps=[]);
  window.addEventListener('resize',resizeScene);
  window.addEventListener('beforeunload',stopCamera);
  resizeScene();
  requestAnimationFrame(animate);
})();
</script>

</body>
</html>
