<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Black Frame Digital Stamping</title>
<style>
:root{color-scheme:dark;--panel:rgba(0,0,0,.5)}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#111;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}#camera,#scene{position:fixed;inset:0;width:100%;height:100%}#camera{object-fit:cover;transform:scaleX(-1);background:#111}#scene{pointer-events:none}.shade{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center,transparent 0 42%,rgba(0,0,0,.08) 68%,rgba(0,0,0,.3) 100%)}#paperBox{position:fixed;display:none;pointer-events:none;border:3px solid #fff;border-radius:6px;box-shadow:0 0 0 1px rgba(0,0,0,.55),0 0 28px rgba(255,255,255,.6);transition:left .08s linear,top .08s linear,width .08s linear,height .08s linear,box-shadow .2s,border-color .2s}#paperBox.ready{border-color:#8dffad;box-shadow:0 0 0 1px rgba(0,0,0,.45),0 0 42px rgba(100,255,145,.95)}#progress{position:fixed;left:50%;bottom:96px;width:min(74vw,460px);height:5px;transform:translateX(-50%);overflow:hidden;border-radius:999px;background:rgba(255,255,255,.2);pointer-events:none}#progressBar{width:0;height:100%;background:#fff;border-radius:inherit;transition:width .08s linear}#status{position:fixed;left:50%;bottom:112px;transform:translateX(-50%);width:min(92vw,680px);text-align:center;color:#fff;font-size:14px;line-height:1.55;text-shadow:0 1px 9px rgba(0,0,0,.9);pointer-events:none}#controls{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:10px;z-index:4}button{appearance:none;border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:11px 16px;color:#fff;background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font:inherit;cursor:pointer;white-space:nowrap}button:disabled{opacity:.4}#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none}#flash.on{animation:flash .32s ease-out}@keyframes flash{0%{opacity:0}18%{opacity:.5}100%{opacity:0}}@media(max-width:520px){button{padding:10px 13px;font-size:13px}#status{font-size:13px;bottom:108px}#progress{bottom:94px}}
</style>
</head>
<body>
<video id="camera" autoplay muted playsinline></video>
<canvas id="scene"></canvas>
<div class="shade"></div>
<div id="paperBox"></div>
<div id="status">「カメラを開始」を押し、太い黒枠付きの白い紙をかざしてください。</div>
<div id="progress"><div id="progressBar"></div></div>
<div id="controls"><button id="startButton">カメラを開始</button><button id="captureButton" disabled>手動スタンプ</button><button id="clearButton">クリア</button></div>
<div id="flash"></div>
<canvas id="analysisCanvas" width="200" height="150" hidden></canvas>
<canvas id="captureCanvas" hidden></canvas>
<script>
(()=>{'use strict';
const video=document.getElementById('camera'),scene=document.getElementById('scene'),ctx=scene.getContext('2d');
const ac=document.getElementById('analysisCanvas'),ax=ac.getContext('2d',{willReadFrequently:true});
const cc=document.getElementById('captureCanvas'),cx=cc.getContext('2d');
const paperBox=document.getElementById('paperBox'),progressBar=document.getElementById('progressBar'),status=document.getElementById('status'),startButton=document.getElementById('startButton'),captureButton=document.getElementById('captureButton'),clearButton=document.getElementById('clearButton'),flash=document.getElementById('flash');
const CFG={stableSeconds:1.5,interval:100,cooldown:1800,minArea:.035,maxArea:.62,minAspect:.72,maxAspect:1.38,minSide:24,borderBand:.13,minEdgeDark:.34,maxInnerDark:.2,minInnerLum:150,stability:.075,captureInset:.075,maxSide:620,maxStamps:30};
let stream=null,timer=null,box=null,smooth=null,prev=null,stable=0,lastTick=performance.now(),lastCapture=0,stamps=[];
function resize(){const d=Math.min(devicePixelRatio||1,2);scene.width=Math.round(innerWidth*d);scene.height=Math.round(innerHeight*d);scene.style.width=innerWidth+'px';scene.style.height=innerHeight+'px';ctx.setTransform(d,0,0,d,0,0)}
function crop(){const vw=video.videoWidth,vh=video.videoHeight,sw=innerWidth,sh=innerHeight,vr=vw/vh,sr=sw/sh;if(vr>sr){const w=vh*sr;return{visibleW:w,visibleH:vh,cropX:(vw-w)/2,cropY:0}}const h=vw/sr;return{visibleW:vw,visibleH:h,cropX:0,cropY:(vh-h)/2}}
async function start(){try{stop();stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();captureButton.disabled=false;startButton.textContent='カメラ再起動';status.textContent='黒枠付きの紙を画面内にかざしてください。傾いていても認識できます。1.5秒静止すると取り込みます。';stable=0;box=smooth=prev=null;lastTick=performance.now();timer=setInterval(analyse,CFG.interval)}catch(e){console.error(e);status.textContent='カメラを開始できません。HTTPS環境とカメラ許可を確認してください。'}}
function stop(){if(timer){clearInterval(timer);timer=null}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}
function percentile(arr,p){const a=Array.from(arr).sort((x,y)=>x-y);return a[Math.floor((a.length-1)*p)]}
function pointInPoly(x,y,poly){let inside=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;const hit=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/((yj-yi)||1e-6)+xi);if(hit)inside=!inside}return inside}
function polygonArea(poly){let a=0;for(let i=0,j=poly.length-1;i<poly.length;j=i++)a+=(poly[j].x*poly[i].y-poly[i].x*poly[j].y);return Math.abs(a)*.5}
function scalePoly(poly,scale){const c=poly.reduce((q,p)=>({x:q.x+p.x/poly.length,y:q.y+p.y/poly.length}),{x:0,y:0});return poly.map(p=>({x:c.x+(p.x-c.x)*scale,y:c.y+(p.y-c.y)*scale}))}
function quadFromPixels(points){let tl=null,tr=null,br=null,bl=null,minS=1e9,maxS=-1e9,minD=1e9,maxD=-1e9;for(const p of points){const sum=p.x+p.y,diff=p.x-p.y;if(sum<minS){minS=sum;tl=p}if(sum>maxS){maxS=sum;br=p}if(diff>maxD){maxD=diff;tr=p}if(diff<minD){minD=diff;bl=p}}return[tl,tr,br,bl].map(p=>({x:p.x,y:p.y}))}
function sampleLumBilinear(lum,W,H,x,y){
  const xi=Math.round(x),yi=Math.round(y);
  if(xi<0||xi>=W||yi<0||yi>=H)return 255;
  return lum[yi*W+xi];
}
function sampleArrayNearest(arr,W,H,x,y,defaultValue=255){
  const xi=Math.round(x),yi=Math.round(y);
  if(xi<0||xi>=W||yi<0||yi>=H)return defaultValue;
  return arr[yi*W+xi];
}
function evaluateFrameTemplate(lum,chroma,W,H,cx0,cy0,rw,rh,angle,threshold){
  const ca=Math.cos(angle),sa=Math.sin(angle);
  const sides={top:[0,0],right:[0,0],bottom:[0,0],left:[0,0]};
  let innerWhite=0,innerN=0,innerLum=0,midDark=0,midN=0;
  // 黒枠の四辺を別々に評価し、中央は低彩度の白だけを高く評価する。
  for(let gy=-7;gy<=7;gy++){
    const ny=gy/7;
    for(let gx=-7;gx<=7;gx++){
      const nx=gx/7,ax=Math.abs(nx),ay=Math.abs(ny),edge=Math.max(ax,ay);
      const lx=nx*rw*.5,ly=ny*rh*.5;
      const x=cx0+lx*ca-ly*sa,y=cy0+lx*sa+ly*ca;
      const v=sampleArrayNearest(lum,W,H,x,y,255);
      const c=sampleArrayNearest(chroma,W,H,x,y,255);
      if(edge>=.72){
        let key;
        if(ay>=ax) key=ny<0?'top':'bottom'; else key=nx<0?'left':'right';
        sides[key][1]++;
        if(v<threshold+24) sides[key][0]++;
      }else if(edge<=.44){
        innerN++; innerLum+=v;
        if(v>=Math.max(155,threshold+52)&&c<=42)innerWhite++;
      }else{
        midN++;if(v<threshold+3)midDark++;
      }
    }
  }
  if(!innerN)return null;
  const sideRatios=Object.values(sides).map(([d,n])=>d/Math.max(1,n));
  const minSideDark=Math.min(...sideRatios);
  const darkRatio=sideRatios.reduce((a,b)=>a+b,0)/4;
  const brightRatio=innerWhite/innerN;
  const innerMean=innerLum/innerN;
  const midDarkRatio=midDark/Math.max(1,midN);
  if(minSideDark<.40||brightRatio<.36||innerMean<CFG.minInnerLum)return null;
  const contrast=Math.max(0,Math.min(1,(innerMean-(threshold+18))/100));
  const score=minSideDark*1.45+darkRatio*.55+brightRatio*1.15+contrast*.45-midDarkRatio*.1;
  return{score,darkRatio,brightRatio,midDark:midDarkRatio,minSideDark,innerMean};
}
function detect(img){
  const W=ac.width,H=ac.height,d=img.data,N=W*H;
  const lum=new Uint8Array(N),chroma=new Uint8Array(N),sample=[];
  for(let i=0;i<N;i++){
    const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
    const v=Math.round(.299*r+.587*g+.114*b);
    lum[i]=v;chroma[i]=Math.max(r,g,b)-Math.min(r,g,b);if(i%7===0)sample.push(v);
  }
  const p18=percentile(sample,.18);
  const threshold=Math.max(48,Math.min(128,p18+28));
  let best=null,tested=0;
  const angles=[-30,-20,-10,0,10,20,30].map(v=>v*Math.PI/180);
  const aspects=[.82,.9,1,1.1,1.22];
  const minSize=Math.max(34,Math.round(Math.min(W,H)*.22));
  const maxSize=Math.round(Math.min(W,H)*.78);
  for(let size=minSize;size<=maxSize;size+=10){
    for(const aspect of aspects){
      const rw=size*Math.sqrt(aspect),rh=size/Math.sqrt(aspect);
      if(rw>W*.9||rh>H*.9)continue;
      const margin=Math.ceil(Math.hypot(rw,rh)/2)+2;
      const step=Math.max(5,Math.round(size*.13));
      for(let cy0=margin;cy0<H-margin;cy0+=step){
        for(let cx0=margin;cx0<W-margin;cx0+=step){
          for(const angle of angles){
            tested++;
            const ev=evaluateFrameTemplate(lum,chroma,W,H,cx0,cy0,rw,rh,angle,threshold);
            if(!ev)continue;
            const area=rw*rh,areaRatio=area/N;
            if(areaRatio<CFG.minArea||areaRatio>CFG.maxArea)continue;
            const score=ev.score+Math.min(areaRatio,.25)*.18;
            if(!best||score>best.score){
              const ca=Math.cos(angle),sa=Math.sin(angle),hx=rw/2,hy=rh/2;
              const local=[[-hx,-hy],[hx,-hy],[hx,hy],[-hx,hy]];
              const quad=local.map(([x,y])=>({x:cx0+x*ca-y*sa,y:cy0+x*sa+y*ca}));
              const xs=quad.map(p=>p.x),ys=quad.map(p=>p.y);
              best={x:Math.min(...xs),y:Math.min(...ys),w:Math.max(...xs)-Math.min(...xs),h:Math.max(...ys)-Math.min(...ys),quad,score,threshold,e:ev.darkRatio,id:1-ev.brightRatio,il:ev.innerMean,angle,minSideDark:ev.minSideDark};
            }
          }
        }
      }
    }
  }
  // 粗探索の周辺を細かく再探索。
  if(best){
    const q=best.quad,cx0=q.reduce((a,p)=>a+p.x/4,0),cy0=q.reduce((a,p)=>a+p.y/4,0);
    const rw=Math.hypot(q[1].x-q[0].x,q[1].y-q[0].y),rh=Math.hypot(q[3].x-q[0].x,q[3].y-q[0].y);
    const baseAngle=Math.atan2(q[1].y-q[0].y,q[1].x-q[0].x);
    for(let dy=-8;dy<=8;dy+=4)for(let dx=-8;dx<=8;dx+=4)for(let ds=-.12;ds<=.12;ds+=.06)for(let da=-6;da<=6;da+=3){
      const nrw=rw*(1+ds),nrh=rh*(1+ds),ang=baseAngle+da*Math.PI/180;
      const ev=evaluateFrameTemplate(lum,chroma,W,H,cx0+dx,cy0+dy,nrw,nrh,ang,threshold);
      if(!ev)continue;
      const score=ev.score;
      if(score>best.score){
        const ca=Math.cos(ang),sa=Math.sin(ang),hx=nrw/2,hy=nrh/2;
        const quad=[[-hx,-hy],[hx,-hy],[hx,hy],[-hx,hy]].map(([x,y])=>({x:cx0+dx+x*ca-y*sa,y:cy0+dy+x*sa+y*ca}));
        const xs=quad.map(p=>p.x),ys=quad.map(p=>p.y);
        best={x:Math.min(...xs),y:Math.min(...ys),w:Math.max(...xs)-Math.min(...xs),h:Math.max(...ys)-Math.min(...ys),quad,score,threshold,e:ev.darkRatio,id:1-ev.brightRatio,il:ev.innerMean,angle:ang,minSideDark:ev.minSideDark};
      }
    }
  }
  detect.lastDebug={threshold,candidateCount:best?1:0,tested,bestScore:best?best.score:0,border:best?best.e:0,inner:best?1-best.id:0,minSide:best?best.minSideDark:0};
  return best;
}
function distance(a,b){if(!a||!b)return 99;const acx=a.x+a.w/2,acy=a.y+a.h/2,bcx=b.x+b.w/2,bcy=b.y+b.h/2;return Math.hypot(acx-bcx,acy-bcy)/Math.hypot(ac.width,ac.height)+(Math.abs(a.w-b.w)+Math.abs(a.h-b.h))/(ac.width+ac.height)}
function lerpBox(a,b){if(!a)return{...b,quad:b.quad.map(p=>({...p}))};const k=.35;return{x:a.x*(1-k)+b.x*k,y:a.y*(1-k)+b.y*k,w:a.w*(1-k)+b.w*k,h:a.h*(1-k)+b.h*k,quad:a.quad.map((p,i)=>({x:p.x*(1-k)+b.quad[i].x*k,y:p.y*(1-k)+b.quad[i].y*k}))}}
function screenBox(b){return{x:b.x/ac.width*innerWidth,y:b.y/ac.height*innerHeight,w:b.w/ac.width*innerWidth,h:b.h/ac.height*innerHeight}}
function analyse(){if(!stream||video.readyState<2)return;const now=performance.now(),dt=Math.min((now-lastTick)/1000,.25);lastTick=now;const c=crop();ax.save();ax.setTransform(-1,0,0,1,ac.width,0);ax.drawImage(video,c.cropX,c.cropY,c.visibleW,c.visibleH,0,0,ac.width,ac.height);ax.restore();box=detect(ax.getImageData(0,0,ac.width,ac.height));const cooled=now-lastCapture>CFG.cooldown;if(box){smooth=lerpBox(smooth,box);const sb=screenBox(smooth);paperBox.style.display='none';if(distance(box,prev)<CFG.stability&&cooled){stable+=dt;status.textContent='黒枠を認識しています。そのまま1.5秒静止してください…'}else{stable=Math.max(0,stable-dt*1.2);status.textContent=cooled?'黒枠を認識しました。少し静止してください。':'スタンプしました。次の紙を準備してください。'}prev={...box}}else{box=smooth=prev=null;stable=Math.max(0,stable-dt*2);paperBox.style.display='none';status.textContent=cooled?'黒枠を探索中… スコア '+(((detect.lastDebug&&detect.lastDebug.bestScore)||0).toFixed(2))+' / 外周 '+Math.round(((detect.lastDebug&&detect.lastDebug.border)||0)*100)+'% / 最弱辺 '+Math.round(((detect.lastDebug&&detect.lastDebug.minSide)||0)*100)+'% / 白中央 '+Math.round(((detect.lastDebug&&detect.lastDebug.inner)||0)*100)+'%':'スタンプしました。次の紙を準備してください。'}const r=Math.min(stable/CFG.stableSeconds,1);progressBar.style.width=r*100+'%';paperBox.classList.toggle('ready',r>.72);if(stable>=CFG.stableSeconds){stable=0;captureStamp()}}
function sourceRect(b){const c=crop(),mx=b.x/ac.width*c.visibleW,my=b.y/ac.height*c.visibleH,mw=b.w/ac.width*c.visibleW,mh=b.h/ac.height*c.visibleH;return{sx:c.cropX+(c.visibleW-mx-mw),sy:c.cropY+my,sw:mw,sh:mh}}
function captureStamp(){if(!stream||!smooth){status.textContent='黒枠付きの紙が認識されていません。';return}const inset=Math.min(smooth.w,smooth.h)*CFG.captureInset,b={x:smooth.x+inset,y:smooth.y+inset,w:smooth.w-inset*2,h:smooth.h-inset*2},r=sourceRect(b),scale=Math.min(1,CFG.maxSide/Math.max(r.sw,r.sh)),ow=Math.max(80,Math.round(r.sw*scale)),oh=Math.max(80,Math.round(r.sh*scale));cc.width=ow;cc.height=oh;cx.save();cx.setTransform(-1,0,0,1,ow,0);cx.drawImage(video,r.sx,r.sy,r.sw,r.sh,0,0,ow,oh);cx.restore();const img=new Image();img.onload=()=>{const sb=screenBox(b),max=Math.min(innerWidth*.58,360),ratio=ow/oh;let w=Math.min(sb.w,max),h=w/ratio;if(h>innerHeight*.5){h=innerHeight*.5;w=h*ratio}stamps.push({image:img,x:sb.x+sb.w/2,y:sb.y+sb.h/2,width:w,height:h,vx:(Math.random()-.5)*20,vy:18+Math.random()*12,gravity:13+Math.random()*8,angle:(Math.random()-.5)*.18,av:(Math.random()-.5)*.26,phase:Math.random()*Math.PI*2,flutter:16+Math.random()*20,fs:1.1+Math.random()*1.5,age:0});if(stamps.length>CFG.maxStamps)stamps.shift()};img.src=cc.toDataURL('image/jpeg',.92);lastCapture=performance.now();flash.classList.remove('on');void flash.offsetWidth;flash.classList.add('on');paperBox.classList.remove('ready');status.textContent='スタンプしました。次の紙を準備してください。'}
let prevAnim=performance.now();function animate(now){const dt=Math.min((now-prevAnim)/1000,.04);prevAnim=now;ctx.clearRect(0,0,innerWidth,innerHeight);const t=now/1000;if(smooth&&smooth.quad){const q=smooth.quad.map(p=>({x:p.x/ac.width*innerWidth,y:p.y/ac.height*innerHeight}));ctx.save();ctx.beginPath();ctx.moveTo(q[0].x,q[0].y);for(let i=1;i<4;i++)ctx.lineTo(q[i].x,q[i].y);ctx.closePath();ctx.lineWidth=3;ctx.strokeStyle=stable/CFG.stableSeconds>.72?'#8dffad':'#ffffff';ctx.shadowColor=stable/CFG.stableSeconds>.72?'rgba(100,255,145,.95)':'rgba(255,255,255,.7)';ctx.shadowBlur=20;ctx.stroke();ctx.restore()}for(const s of stamps){s.age+=dt;s.vy+=s.gravity*dt;s.y+=s.vy*dt;s.x+=s.vx*dt+Math.sin(t*s.fs+s.phase)*s.flutter*dt;s.angle+=s.av*dt+Math.sin(t*1.7+s.phase)*.012;const sq=.8+Math.abs(Math.cos(t*s.fs+s.phase))*.2;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);ctx.scale(sq,1);ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=Math.max(6,18*sq);ctx.shadowOffsetY=8;ctx.drawImage(s.image,-s.width/2,-s.height/2,s.width,s.height);ctx.restore()}stamps=stamps.filter(s=>s.y-s.height/2<innerHeight+100&&s.age<30);requestAnimationFrame(animate)}
startButton.onclick=start;captureButton.onclick=captureStamp;clearButton.onclick=()=>stamps=[];addEventListener('resize',resize);addEventListener('beforeunload',stop);resize();requestAnimationFrame(animate);
})();
</script>
</body></html>
